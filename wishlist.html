<!DOCTYPE html>
<html>

<head>
    <title>Wishlist</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <button onclick="location.href='index.html'">Home</button>
    <button onclick="location.href='shop.html'">Shop</button>
    <div class="dropdown">
    <button class="dropbtn" onclick="location.href='shop.html'">
        Shop
    </button>

    <div class="dropdown-content">
        <a href="colouring-books.html">Colouring Books</a>
        <a href="bookmarks.html">Bookmarks</a>
        <a href="stickers.html">Stickers</a>
    </div>
</div>
    <button onclick="location.href='characters.html'">Meet the Characters</button>
    <button onclick="location.href='about.html'">About</button>
    <button onclick="location.href='contact.html'">Contact</button>
    <button onclick="location.href='basket.html'">Basket (<span class="basket-count">0</span>)</button>
    <button class="active" onclick="location.href='wishlist.html'">Wishlist</button>
</nav>

<div class="container">

    <h1>Wishlist</h1>

    <div id="wishlist-items"></div>

</div>

<script src="script.js"></script>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let wishlistItems = document.getElementById("wishlist-items");

function showWishlist() {
    wishlistItems.innerHTML = "";

    if (wishlist.length === 0) {
        wishlistItems.innerHTML = `
            <div class="basket-item">
                <h2>Your wishlist is empty</h2>
                <p>Save your favourite Little Lantern treasures here.</p>
                <button onclick="location.href='shop.html'">Explore Shop</button>
            </div>
        `;
        return;
    }

    wishlist.forEach(function(item, index) {
        wishlistItems.innerHTML += `
            <div class="basket-item">
                <img src="${item.image}" alt="${item.name}" class="basket-image">

                <div class="basket-info">
                    <h2>${item.name}</h2>

                    <button onclick="location.href='${item.link}'">View Product</button>

                    <button onclick="removeWishlistItem(${index})">Remove</button>
                </div>
            </div>
        `;
    });
}

function removeWishlistItem(index) {
    wishlist.splice(index, 1);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    showWishlist();
}

showWishlist();
</script>

</body>
</html>
