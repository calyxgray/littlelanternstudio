<!DOCTYPE html>
<html>

<head>
    <title>Wishlist</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav class="main-nav">

  <!-- Only shown on phones -->
  <div class="mobile-nav-header">
    <a href="index.html" class="mobile-brand">Little Lantern</a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="navLinks"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Normal desktop nav, hamburger contents on phones -->
  <div class="nav-links" id="navLinks">

    <a href="about.html">About</a>

    <a href="characters.html">Meet the Characters</a>

    <div class="dropdown">
      <button class="dropbtn" type="button">Shop</button>

      <div class="dropdown-content">
        <a href="colouring-books.html">Colouring Books</a>
        <a href="bookmarks.html">Bookmarks</a>
        <a href="stickers.html">Stickers</a>
      </div>
    </div>

    <a href="contact.html">Contact</a>

    <a href="wishlist.html">Wishlist</a>

    <a href="basket.html">
      Basket <span id="basket-count">(0)</span>
    </a>

    <div class="site-search">
      <input
        type="search"
        id="siteSearch"
        placeholder="Search..."
        aria-label="Search Little Lantern"
      >

      <div id="searchResults"></div>
    </div>

  </div>

</nav>

<div class="container">

    <h1>Wishlist</h1>

    <div id="wishlist-items"></div>

</div>

<script src="script.js"></script>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let wishlistItems = document.getElementById("wishlist-items");

function showWishlist() {
    wishlistItems.innerHTML = "";

    if (wishlist.length === 0) {
        wishlistItems.innerHTML = `
            <div class="basket-item">
                <h2>Your wishlist is empty</h2>
                <p>Save your favourite Little Lantern treasures here.</p>
                <button onclick="location.href='shop.html'">Explore Shop</button>
            </div>
        `;
        return;
    }

    wishlist.forEach(function(item, index) {
        wishlistItems.innerHTML += `
            <div class="basket-item">
                <img src="${item.image}" alt="${item.name}" class="basket-image">

                <div class="basket-info">
                    <h2>${item.name}</h2>

                    <button onclick="location.href='${item.link}'">View Product</button>

                    <button onclick="removeWishlistItem(${index})">Remove</button>
                </div>
            </div>
        `;
    });
}

function removeWishlistItem(index) {
    wishlist.splice(index, 1);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    showWishlist();
}

showWishlist();
</script>

</body>
</html>
