<!DOCTYPE html>
<html>

<head>
    <title>Basket</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav class="main-nav">

  <!-- Only shown on phones -->
  <div class="mobile-nav-header">
    <a href="index.html" class="mobile-brand">Little Lantern</a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="navLinks"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Normal desktop nav, hamburger contents on phones -->
  <div class="nav-links" id="navLinks">

    <a href="about.html">About</a>

    <a href="characters.html">Meet the Characters</a>

    <div class="dropdown">
      <button class="dropbtn" type="button">Shop</button>

      <div class="dropdown-content">
        <a href="colouring-books.html">Colouring Books</a>
        <a href="bookmarks.html">Bookmarks</a>
        <a href="stickers.html">Stickers</a>
      </div>
    </div>

    <a href="contact.html">Contact</a>

    <a href="wishlist.html">Wishlist</a>

    <a href="basket.html">
      Basket <span id="basket-count">(0)</span>
    </a>

    <div class="site-search">
      <input
        type="search"
        id="siteSearch"
        placeholder="Search..."
        aria-label="Search Little Lantern"
      >

      <div id="searchResults"></div>
    </div>

  </div>

</nav>

<div class="container">
    <h1>Your Basket</h1>

    <div id="basket-items"></div>

    <h2 id="basket-total">Total: £0.00</h2>

    <button onclick="clearBasket()">Clear Basket</button>
</div>

<script src="script.js"></script>

<script>
let basket = JSON.parse(localStorage.getItem("basket")) || [];
let basketItems = document.getElementById("basket-items");
let basketTotal = document.getElementById("basket-total");

function showBasket() {
    basketItems.innerHTML = "";
    let total = 0;

    if (basket.length === 0) {
        basketItems.innerHTML = `
            <div class="basket-item">
                <h2>Your basket is empty</h2>
                <p>Time to explore the woods...</p>
                <button onclick="location.href='shop.html'">Continue Shopping</button>
            </div>
        `;
        basketTotal.innerText = "Total: £0.00";
        return;
    }

    basket.forEach(function(product, index) {
        let subtotal = Number(product.price) * product.quantity;

        basketItems.innerHTML += `
            <div class="basket-item">
                <img src="${product.image}" alt="${product.name}" class="basket-image">

                <div class="basket-info">
                    <h2>${product.name}</h2>
                    <p class="product-type">Peeking Bookmark</p>
                    <p>£${Number(product.price).toFixed(2)} each</p>

                    <div class="quantity-controls">
                        <button onclick="decreaseQuantity(${index})">-</button>
                        <span>${product.quantity}</span>
                        <button onclick="increaseQuantity(${index})">+</button>
                    </div>

                    <p class="basket-subtotal">Subtotal: £${subtotal.toFixed(2)}</p>

                    <button onclick="removeItem(${index})">Remove</button>
                </div>
            </div>
        `;

        total += subtotal;
    });

    basketTotal.innerText = "Total: £" + total.toFixed(2);
}

function increaseQuantity(index) {
    basket[index].quantity++;
    localStorage.setItem("basket", JSON.stringify(basket));
    showBasket();
    updateBasketCount();
}

function decreaseQuantity(index) {
    if (basket[index].quantity > 1) {
        basket[index].quantity--;
    } else {
        basket.splice(index, 1);
    }

    localStorage.setItem("basket", JSON.stringify(basket));
    showBasket();
    updateBasketCount();
}

function removeItem(index) {
    basket.splice(index, 1);
    localStorage.setItem("basket", JSON.stringify(basket));
    showBasket();
    updateBasketCount();
}

function clearBasket() {
    localStorage.removeItem("basket");
    basket = [];
    showBasket();
    updateBasketCount();
}

showBasket();
</script>

</body>
</html>
